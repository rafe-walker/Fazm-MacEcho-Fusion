workflows:
  # ============================================
  # FAZM DESKTOP SWIFT RELEASE
  # Builds, signs, notarizes, and publishes the Swift macOS app.
  #
  # Trigger: push a tag like v0.0.1+1-macos to m13v/fazm
  #   git tag v0.0.1+1-macos && git push origin v0.0.1+1-macos
  #
  # Required Codemagic environment variable groups:
  #   appstore_credentials:
  #     APP_STORE_CONNECT_PRIVATE_KEY, APP_STORE_CONNECT_KEY_IDENTIFIER,
  #     APP_STORE_CONNECT_ISSUER_ID (for notarization)
  #     MACOS_DEVELOPER_ID_P12 — base64 .p12 (Developer ID Application: Matthew Diakonov S6DP5HF77G)
  #     MACOS_DEVELOPER_ID_P12_PASSWORD
  #
  #   fazm_secrets:
  #     FAZM_APP_ENV                    — base64-encoded .env.app (runtime secrets bundled into .app)
  #     GCP_SERVICE_ACCOUNT_KEY         — base64 GCP service account JSON
  #     RELEASE_SECRET                  — shared secret for release registration API
  #     APPLE_CLIENT_ID, APPLE_TEAM_ID, APPLE_KEY_ID, APPLE_PRIVATE_KEY
  #     RESEND_API_KEY
  #     SENTRY_AUTH_TOKEN
  #     GITHUB_TOKEN                    — PAT with repo scope for gh release create
  # ============================================
  fazm-desktop-release:
    name: Release Fazm Desktop
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      groups:
        - appstore_credentials
        - fazm_secrets
      vars:
        BINARY_NAME: "Fazm"
        APP_NAME: "Fazm"
        BUNDLE_ID: "com.fazm.app"
        BUILD_DIR: "build"
        GITHUB_REPO: "m13v/fazm"
      xcode: 16.4
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "v*-macos"
          include: true
        - pattern: "v*-macos-staging"
          include: true
    cache:
      cache_paths:
        - ~/Library/Caches/org.swift.swiftpm
        - /tmp/mcp-binary-cache
    scripts:
      - name: Extract version and build number from tag
        script: |
          # Tag format: v{version}+{build}-macos[-staging]  e.g. v0.0.1+1-macos or v0.0.1+1-macos-staging
          VERSION=$(echo "$CM_TAG" | sed -E 's/^v([0-9.]+)\+([0-9]+)-macos(-staging)?$/\1/')
          BUILD_NUMBER=$(echo "$CM_TAG" | sed -E 's/^v([0-9.]+)\+([0-9]+)-macos(-staging)?$/\2/')
          if [ -z "$VERSION" ] || [ "$VERSION" = "$CM_TAG" ]; then
            echo "ERROR: Could not parse version from tag: $CM_TAG"
            echo "Expected format: v{version}+{build}-macos[-staging] (e.g. v0.0.1+1-macos)"
            exit 1
          fi
          # Detect staging build
          IS_STAGING="false"
          if echo "$CM_TAG" | grep -q "\-staging$"; then
            IS_STAGING="true"
          fi
          echo "VERSION=$VERSION" >> $CM_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $CM_ENV
          echo "IS_STAGING=$IS_STAGING" >> $CM_ENV
          echo "APP_BUNDLE=$BUILD_DIR/$APP_NAME.app" >> $CM_ENV
          echo "DMG_PATH=$BUILD_DIR/$APP_NAME.dmg" >> $CM_ENV
          echo "SPARKLE_ZIP_PATH=$BUILD_DIR/Fazm.zip" >> $CM_ENV
          echo "Building Fazm Desktop v$VERSION (build $BUILD_NUMBER) staging=$IS_STAGING"

      - name: Set up keychain and import Developer ID certificate
        script: |
          keychain initialize
          echo "$MACOS_DEVELOPER_ID_P12" | base64 --decode > /tmp/developer_id.p12
          KEYCHAIN_PATH=$(keychain get-default)
          security import /tmp/developer_id.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "${MACOS_DEVELOPER_ID_P12_PASSWORD:-}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN_PATH" 2>/dev/null || true
          rm /tmp/developer_id.p12
          SIGN_IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          if [ -z "$SIGN_IDENTITY" ]; then
            echo "ERROR: Developer ID Application certificate not found in keychain"
            exit 1
          fi
          echo "SIGN_IDENTITY=$SIGN_IDENTITY" >> $CM_ENV
          echo "Found signing identity: $SIGN_IDENTITY"

      - name: Build acp-bridge (TypeScript → JavaScript)
        script: |
          cd acp-bridge
          npm install --no-fund --no-audit
          npm run build
          cd ..

      - name: Prepare universal ffmpeg (arm64 + x86_64)
        script: |
          FFMPEG_RESOURCE="Desktop/Sources/Resources/ffmpeg"
          if file "$FFMPEG_RESOURCE" 2>/dev/null | grep -q "universal binary"; then
            echo "ffmpeg already universal, skipping download"
          else
            echo "Creating universal ffmpeg..."
            TEMP_DIR="/tmp/ffmpeg-universal-$$"
            mkdir -p "$TEMP_DIR"
            curl -L -o "$TEMP_DIR/ffmpeg-arm64.zip" \
              "https://ffmpeg.martin-riedl.de/redirect/latest/macos/arm64/release/ffmpeg.zip"
            unzip -q -o "$TEMP_DIR/ffmpeg-arm64.zip" -d "$TEMP_DIR/arm64/"
            curl -L -o "$TEMP_DIR/ffmpeg-x86_64.zip" \
              "https://ffmpeg.martin-riedl.de/redirect/latest/macos/amd64/release/ffmpeg.zip"
            unzip -q -o "$TEMP_DIR/ffmpeg-x86_64.zip" -d "$TEMP_DIR/x86_64/"
            ARM64_FFMPEG=$(find "$TEMP_DIR/arm64" -name "ffmpeg" -type f | head -1)
            X86_64_FFMPEG=$(find "$TEMP_DIR/x86_64" -name "ffmpeg" -type f | head -1)
            lipo -create "$ARM64_FFMPEG" "$X86_64_FFMPEG" -output "$FFMPEG_RESOURCE"
            chmod +x "$FFMPEG_RESOURCE"
            xattr -cr "$FFMPEG_RESOURCE"
            codesign -f -s - "$FFMPEG_RESOURCE"
            rm -rf "$TEMP_DIR"
          fi
          echo "ffmpeg: $(file "$FFMPEG_RESOURCE" | sed 's/.*: //')"

      - name: Prepare universal Node.js (arm64 + x86_64)
        script: |
          NODE_RESOURCE="Desktop/Sources/Resources/node"
          NODE_VERSION="v22.14.0"
          if file "$NODE_RESOURCE" 2>/dev/null | grep -q "universal binary"; then
            echo "Node.js already universal, skipping download"
          else
            echo "Creating universal Node.js $NODE_VERSION..."
            TEMP_DIR="/tmp/node-universal-$$"
            mkdir -p "$TEMP_DIR"
            curl -L -o "$TEMP_DIR/arm64.tar.gz" \
              "https://nodejs.org/dist/$NODE_VERSION/node-$NODE_VERSION-darwin-arm64.tar.gz"
            tar -xzf "$TEMP_DIR/arm64.tar.gz" -C "$TEMP_DIR"
            ARM64=$(find "$TEMP_DIR" -name "node" -type f | head -1)
            mv "$ARM64" "$TEMP_DIR/node-arm64"
            curl -L -o "$TEMP_DIR/x86_64.tar.gz" \
              "https://nodejs.org/dist/$NODE_VERSION/node-$NODE_VERSION-darwin-x64.tar.gz"
            tar -xzf "$TEMP_DIR/x86_64.tar.gz" -C "$TEMP_DIR"
            X86=$(find "$TEMP_DIR" -name "node" -type f ! -name "node-arm64" | head -1)
            lipo -create "$TEMP_DIR/node-arm64" "$X86" -output "$NODE_RESOURCE"
            chmod +x "$NODE_RESOURCE"
            xattr -cr "$NODE_RESOURCE"
            codesign -f -s - "$NODE_RESOURCE"
            rm -rf "$TEMP_DIR"
          fi
          echo "node: $(file "$NODE_RESOURCE" | sed 's/.*: //')"

      - name: Prepare universal cloudflared (arm64 + x86_64)
        script: |
          CLOUDFLARED_RESOURCE="Desktop/Sources/Resources/cloudflared"
          if file "$CLOUDFLARED_RESOURCE" 2>/dev/null | grep -q "universal binary"; then
            echo "cloudflared already universal, skipping download"
          else
            echo "Creating universal cloudflared..."
            TEMP_DIR="/tmp/cloudflared-universal-$$"
            mkdir -p "$TEMP_DIR"
            curl -L -o "$TEMP_DIR/cloudflared-arm64.tgz" \
              "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-darwin-arm64.tgz"
            tar -xzf "$TEMP_DIR/cloudflared-arm64.tgz" -C "$TEMP_DIR"
            mv "$TEMP_DIR/cloudflared" "$TEMP_DIR/cloudflared-arm64"
            curl -L -o "$TEMP_DIR/cloudflared-amd64.tgz" \
              "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-darwin-amd64.tgz"
            tar -xzf "$TEMP_DIR/cloudflared-amd64.tgz" -C "$TEMP_DIR"
            mv "$TEMP_DIR/cloudflared" "$TEMP_DIR/cloudflared-amd64"
            lipo -create "$TEMP_DIR/cloudflared-arm64" "$TEMP_DIR/cloudflared-amd64" -output "$CLOUDFLARED_RESOURCE"
            chmod +x "$CLOUDFLARED_RESOURCE"
            xattr -cr "$CLOUDFLARED_RESOURCE"
            codesign -f -s - "$CLOUDFLARED_RESOURCE"
            rm -rf "$TEMP_DIR"
          fi
          echo "cloudflared: $(file "$CLOUDFLARED_RESOURCE" | sed 's/.*: //')"

      - name: Resolve SPM packages
        script: |
          unset TOOLCHAINS
          echo "Resolving SPM packages..."
          for attempt in 1 2 3; do
            if xcrun swift package resolve --package-path Desktop; then
              echo "  Packages resolved on attempt $attempt"
              break
            fi
            echo "  Resolution failed on attempt $attempt"
            if [ $attempt -lt 3 ]; then
              sleep 15
            else
              echo "ERROR: Package resolution failed after 3 attempts"
              exit 1
            fi
          done

      - name: Build mcp-server-macos-use (arm64 + x86_64)
        script: |
          MCP_MACOS_USE_VERSION="v0.1.15"
          CACHE_DIR="/tmp/mcp-binary-cache"
          CACHE_BINARY="$CACHE_DIR/mcp-server-macos-use-universal-${MCP_MACOS_USE_VERSION}"
          mkdir -p "$CACHE_DIR"

          if [ -f "$CACHE_BINARY" ]; then
            echo "Cache hit: mcp-server-macos-use $MCP_MACOS_USE_VERSION — skipping build"
            cp "$CACHE_BINARY" /tmp/mcp-server-macos-use-universal
          else
            echo "Cache miss: building mcp-server-macos-use $MCP_MACOS_USE_VERSION"
            git clone --depth 1 --branch "$MCP_MACOS_USE_VERSION" https://github.com/mediar-ai/mcp-server-macos-use.git /tmp/mcp-server-macos-use
            cd /tmp/mcp-server-macos-use
            xcrun swift package resolve
            echo "Building arm64..."
            xcrun swift build -c release --triple arm64-apple-macosx
            cp .build/arm64-apple-macosx/release/mcp-server-macos-use /tmp/mcp-macos-use-arm64
            echo "Building x86_64..."
            xcrun swift build -c release --triple x86_64-apple-macosx
            echo "Creating universal binary..."
            lipo -create /tmp/mcp-macos-use-arm64 .build/x86_64-apple-macosx/release/mcp-server-macos-use \
              -output /tmp/mcp-server-macos-use-universal
            file /tmp/mcp-server-macos-use-universal | grep -q "universal binary" || {
              echo "ERROR: Failed to create universal mcp-server-macos-use binary"
              exit 1
            }
            cp /tmp/mcp-server-macos-use-universal "$CACHE_BINARY"
          fi

          echo "MCP_MACOS_USE_BINARY=/tmp/mcp-server-macos-use-universal" >> $CM_ENV
          echo "mcp-server-macos-use: $(du -h /tmp/mcp-server-macos-use-universal | cut -f1) universal"

      - name: Build whatsapp-mcp (arm64 + x86_64)
        script: |
          WHATSAPP_MCP_VERSION="v1.0.1"
          CACHE_DIR="/tmp/mcp-binary-cache"
          CACHE_BINARY="$CACHE_DIR/whatsapp-mcp-universal-${WHATSAPP_MCP_VERSION}"
          mkdir -p "$CACHE_DIR"

          if [ -f "$CACHE_BINARY" ]; then
            echo "Cache hit: whatsapp-mcp $WHATSAPP_MCP_VERSION — skipping build"
            cp "$CACHE_BINARY" /tmp/whatsapp-mcp-universal
          else
            echo "Cache miss: building whatsapp-mcp $WHATSAPP_MCP_VERSION"
            git clone --depth 1 --branch "$WHATSAPP_MCP_VERSION" https://github.com/m13v/whatsapp-mcp-macos.git /tmp/whatsapp-mcp-macos
            cd /tmp/whatsapp-mcp-macos
            xcrun swift package resolve
            echo "Building arm64..."
            xcrun swift build -c release --triple arm64-apple-macosx
            cp .build/arm64-apple-macosx/release/whatsapp-mcp /tmp/whatsapp-mcp-arm64
            echo "Building x86_64..."
            xcrun swift build -c release --triple x86_64-apple-macosx
            echo "Creating universal binary..."
            lipo -create /tmp/whatsapp-mcp-arm64 .build/x86_64-apple-macosx/release/whatsapp-mcp \
              -output /tmp/whatsapp-mcp-universal
            file /tmp/whatsapp-mcp-universal | grep -q "universal binary" || {
              echo "ERROR: Failed to create universal whatsapp-mcp binary"
              exit 1
            }
            cp /tmp/whatsapp-mcp-universal "$CACHE_BINARY"
          fi

          echo "WHATSAPP_MCP_BINARY=/tmp/whatsapp-mcp-universal" >> $CM_ENV
          echo "whatsapp-mcp: $(du -h /tmp/whatsapp-mcp-universal | cut -f1) universal"

      - name: Clone Google Workspace MCP
        script: |
          git clone --depth 1 https://github.com/taylorwilsdon/google_workspace_mcp.git /tmp/google_workspace_mcp
          echo "Cloned Google Workspace MCP"
          # Ensure uv is available for venv creation
          if ! command -v uv &>/dev/null; then
            curl -LsSf https://astral.sh/uv/install.sh | sh
            export PATH="$HOME/.local/bin:$PATH"
            echo "PATH=$HOME/.local/bin:$PATH" >> $CM_ENV
          fi

      - name: Build Swift app (arm64 + x86_64)
        script: |
          mkdir -p "$BUILD_DIR"
          unset TOOLCHAINS

          echo "Building arm64..."
          xcrun swift build -c release --package-path Desktop --triple arm64-apple-macosx

          ARM64_PATH="Desktop/.build/arm64-apple-macosx/release/$BINARY_NAME"
          if [ ! -f "$ARM64_PATH" ]; then
            echo "ERROR: arm64 binary not found at $ARM64_PATH"
            ls "Desktop/.build/" 2>/dev/null
            exit 1
          fi
          cp "$ARM64_PATH" "/tmp/Fazm-arm64"
          echo "arm64 binary: $(file "/tmp/Fazm-arm64" | grep -oE 'arm64|x86_64')"

          echo "Building x86_64..."
          xcrun swift build -c release --package-path Desktop --triple x86_64-apple-macosx
          X86_64_PATH="Desktop/.build/x86_64-apple-macosx/release/$BINARY_NAME"
          echo "x86_64 binary: $(file "$X86_64_PATH" | grep -oE 'arm64|x86_64' | head -1)"

      - name: Create universal app bundle
        script: |
          ARM64_BINARY="/tmp/Fazm-arm64"
          X86_64_BINARY="Desktop/.build/x86_64-apple-macosx/release/$BINARY_NAME"

          if [ ! -f "$ARM64_BINARY" ] || [ ! -f "$X86_64_BINARY" ]; then
            echo "ERROR: Missing built binaries"
            exit 1
          fi

          mkdir -p "$APP_BUNDLE/Contents/MacOS"
          mkdir -p "$APP_BUNDLE/Contents/Resources"
          mkdir -p "$APP_BUNDLE/Contents/Frameworks"

          # Merge architectures into universal binary
          lipo -create "$ARM64_BINARY" "$X86_64_BINARY" -output "$APP_BUNDLE/Contents/MacOS/$BINARY_NAME"
          file "$APP_BUNDLE/Contents/MacOS/$BINARY_NAME" | grep -q "universal binary" || {
            echo "ERROR: lipo failed to create universal binary"
            exit 1
          }

          cp Desktop/Info.plist "$APP_BUNDLE/Contents/Info.plist"

          # Sparkle framework
          SPARKLE_FW="Desktop/.build/x86_64-apple-macosx/release/Sparkle.framework"
          if [ ! -d "$SPARKLE_FW" ]; then
            SPARKLE_FW="Desktop/.build/arm64-apple-macosx/release/Sparkle.framework"
          fi
          if [ -d "$SPARKLE_FW" ]; then
            ditto "$SPARKLE_FW" "$APP_BUNDLE/Contents/Frameworks/Sparkle.framework"
          fi

          install_name_tool -add_rpath "@executable_path/../Frameworks" \
            "$APP_BUNDLE/Contents/MacOS/$BINARY_NAME"

          # Copy app icon
          [ -f "fazm_icon.icns" ] && cp fazm_icon.icns "$APP_BUNDLE/Contents/Resources/FazmIcon.icns"

          # Copy SPM resource bundles
          SWIFT_BUILD_DIR="Desktop/.build/x86_64-apple-macosx/release"
          if [ ! -d "$SWIFT_BUILD_DIR" ]; then
            SWIFT_BUILD_DIR="Desktop/.build/arm64-apple-macosx/release"
          fi
          RESOURCE_BUNDLE="$SWIFT_BUILD_DIR/Fazm_Fazm.bundle"
          if [ -d "$RESOURCE_BUNDLE" ]; then
            cp -R "$RESOURCE_BUNDLE" "$APP_BUNDLE/Contents/Resources/"
          else
            echo "WARNING: SPM resource bundle not found (non-fatal)"
          fi

          # Copy Highlightr resource bundle (required — missing bundle causes fatal crash on launch)
          HIGHLIGHTR_BUNDLE="$SWIFT_BUILD_DIR/Highlightr_Highlightr.bundle"
          if [ -d "$HIGHLIGHTR_BUNDLE" ]; then
            cp -R "$HIGHLIGHTR_BUNDLE" "$APP_BUNDLE/Contents/Resources/"
            echo "Bundled Highlightr_Highlightr.bundle"
          else
            echo "ERROR: Highlightr_Highlightr.bundle not found at $HIGHLIGHTR_BUNDLE — build will produce a crashing app"
            exit 1
          fi

          # Copy acp-bridge
          if [ -d "acp-bridge/dist" ]; then
            mkdir -p "$APP_BUNDLE/Contents/Resources/acp-bridge"
            cp -Rf acp-bridge/dist        "$APP_BUNDLE/Contents/Resources/acp-bridge/"
            cp -f  acp-bridge/package.json "$APP_BUNDLE/Contents/Resources/acp-bridge/"
            cp -Rf acp-bridge/node_modules "$APP_BUNDLE/Contents/Resources/acp-bridge/"
          else
            echo "ERROR: acp-bridge/dist not found"
            exit 1
          fi

          # Copy mcp-server-macos-use binary
          if [ -f "$MCP_MACOS_USE_BINARY" ]; then
              cp "$MCP_MACOS_USE_BINARY" "$APP_BUNDLE/Contents/MacOS/mcp-server-macos-use"
              echo "Bundled mcp-server-macos-use"
          fi

          # Copy whatsapp-mcp binary
          if [ -f "$WHATSAPP_MCP_BINARY" ]; then
              cp "$WHATSAPP_MCP_BINARY" "$APP_BUNDLE/Contents/MacOS/whatsapp-mcp"
              echo "Bundled whatsapp-mcp"
          fi

          # Bundle Google Workspace MCP (Python)
          WORKSPACE_MCP_BUNDLE="$APP_BUNDLE/Contents/Resources/google-workspace-mcp"
          if [ -d "/tmp/google_workspace_mcp" ]; then
            mkdir -p "$WORKSPACE_MCP_BUNDLE"
            rsync -a --exclude='.git' --exclude='__pycache__' --exclude='.venv' \
              --exclude='*.pyc' --exclude='.ruff_cache' --exclude='tests' \
              --exclude='docs' --exclude='build' --exclude='dist' --exclude='*.egg-info' \
              /tmp/google_workspace_mcp/ "$WORKSPACE_MCP_BUNDLE/"
            # Extract dependencies to requirements.txt (used by venv build step below)
            python3 -c 'import tomllib; f=open("/tmp/google_workspace_mcp/pyproject.toml","rb"); deps=tomllib.load(f)["project"]["dependencies"]; [print(d) for d in deps]' > "$WORKSPACE_MCP_BUNDLE/requirements.txt" 2>/dev/null || true
            echo "Bundled Google Workspace MCP source"
          else
            echo "WARNING: Google Workspace MCP not cloned — skipping"
          fi

          # Build Google Workspace MCP venv directly into app bundle
          if [ -f "$WORKSPACE_MCP_BUNDLE/requirements.txt" ]; then
            echo "Creating Google Workspace MCP venv in app bundle..."
            # Use uv-managed standalone python (python-build-standalone) for full portability.
            # The resulting binary uses @executable_path/../lib/libpython3.12.dylib (relative),
            # so it works on any Mac without needing system Python or Xcode CLT installed.
            uv python install 3.12 2>&1 | tail -1 || true
            uv venv "$WORKSPACE_MCP_BUNDLE/.venv" --python 3.12 --relocatable --python-preference only-managed --quiet 2>&1
            uv pip install --python "$WORKSPACE_MCP_BUNDLE/.venv/bin/python3" --link-mode copy \
              -r "$WORKSPACE_MCP_BUNDLE/requirements.txt" --quiet 2>&1 | tail -3 || true
            # Strip __pycache__ to save space (keep .dist-info — needed by importlib.metadata)
            find "$WORKSPACE_MCP_BUNDLE/.venv" -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
            # Replace absolute Python symlink with a copy + bundle libpython for portability
            GWMCP_REAL_PYTHON=$(readlink -f "$WORKSPACE_MCP_BUNDLE/.venv/bin/python" 2>/dev/null)
            GWMCP_MANAGED_DIR=$(dirname "$(dirname "$GWMCP_REAL_PYTHON")")
            if [ -n "$GWMCP_REAL_PYTHON" ] && [ -f "$GWMCP_REAL_PYTHON" ]; then
              rm -f "$WORKSPACE_MCP_BUNDLE/.venv/bin/python"
              cp "$GWMCP_REAL_PYTHON" "$WORKSPACE_MCP_BUNDLE/.venv/bin/python"
              rm -f "$WORKSPACE_MCP_BUNDLE/.venv/bin/python3" "$WORKSPACE_MCP_BUNDLE/.venv/bin/python3.12"
              ln -s python "$WORKSPACE_MCP_BUNDLE/.venv/bin/python3"
              ln -s python "$WORKSPACE_MCP_BUNDLE/.venv/bin/python3.12"
              # Copy libpython so @executable_path/../lib/libpython3.12.dylib resolves
              if [ -f "$GWMCP_MANAGED_DIR/lib/libpython3.12.dylib" ]; then
                cp "$GWMCP_MANAGED_DIR/lib/libpython3.12.dylib" "$WORKSPACE_MCP_BUNDLE/.venv/lib/libpython3.12.dylib"
              fi
              # Copy stdlib so Python can find encodings, os, etc. on machines without uv
              if [ -d "$GWMCP_MANAGED_DIR/lib/python3.12" ]; then
                rsync -a --ignore-existing "$GWMCP_MANAGED_DIR/lib/python3.12/" "$WORKSPACE_MCP_BUNDLE/.venv/lib/python3.12/"
              fi
              # Rewrite pyvenv.cfg so Python finds stdlib relative to venv, not the managed install
              printf 'home = bin\nimplementation = CPython\nversion_info = 3.12\ninclude-system-site-packages = false\n' > "$WORKSPACE_MCP_BUNDLE/.venv/pyvenv.cfg"
            fi
            echo "Google Workspace MCP venv created in app bundle"
          else
            echo "WARNING: Google Workspace MCP requirements.txt not found — skipping venv"
          fi


          # Update Info.plist metadata
          /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable   $BINARY_NAME"  "$APP_BUNDLE/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier   $BUNDLE_ID"    "$APP_BUNDLE/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleName         $APP_NAME"     "$APP_BUNDLE/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName  $APP_NAME"     "$APP_BUNDLE/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :LSMinimumSystemVersion 14.0"        "$APP_BUNDLE/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" \
            "$APP_BUNDLE/Contents/Info.plist" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string $VERSION" \
            "$APP_BUNDLE/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" \
            "$APP_BUNDLE/Contents/Info.plist" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $BUILD_NUMBER" \
            "$APP_BUNDLE/Contents/Info.plist"

          printf "APPL????" > "$APP_BUNDLE/Contents/PkgInfo"

          # Write runtime .env from FAZM_APP_ENV secret
          echo "$FAZM_APP_ENV" | base64 --decode > "$APP_BUNDLE/Contents/Resources/.env"

          # Verify required env vars are present in the bundle
          REQUIRED_VARS="FAZM_BACKEND_URL VERTEX_PROJECT_ID GCP_PROJECT_NUMBER GCP_SERVICE_ACCOUNT GOOGLE_CLIENT_ID FIREBASE_API_KEY"
          for var in $REQUIRED_VARS; do
            if ! grep -q "^${var}=.\+" "$APP_BUNDLE/Contents/Resources/.env"; then
              echo "ERROR: Required env var $var is missing or empty in bundled .env"
              echo "Update FAZM_APP_ENV in Codemagic fazm_secrets group"
              exit 1
            fi
          done
          echo "All required env vars verified in bundled .env"
          echo "App bundle created: $APP_BUNDLE"

      - name: Create arch-specific ZIPs for stub installer
        script: |
          # Create arch-specific app bundles by replacing the universal binary
          # with the single-arch binary, then ZIP each one
          ARM64_BINARY="/tmp/Fazm-arm64"
          X86_64_BINARY="Desktop/.build/x86_64-apple-macosx/release/$BINARY_NAME"

          for ARCH in arm64 x86_64; do
            echo "Creating $ARCH ZIP..."
            ARCH_APP="/tmp/Fazm-$ARCH-app"
            rm -rf "$ARCH_APP"
            ditto "$APP_BUNDLE" "$ARCH_APP/$APP_NAME.app"

            # Replace universal binary with single-arch
            if [ "$ARCH" = "arm64" ]; then
              lipo "$ARCH_APP/$APP_NAME.app/Contents/MacOS/$BINARY_NAME" \
                -thin arm64 -output "$ARCH_APP/$APP_NAME.app/Contents/MacOS/$BINARY_NAME.thin"
            else
              lipo "$ARCH_APP/$APP_NAME.app/Contents/MacOS/$BINARY_NAME" \
                -thin x86_64 -output "$ARCH_APP/$APP_NAME.app/Contents/MacOS/$BINARY_NAME.thin"
            fi
            mv "$ARCH_APP/$APP_NAME.app/Contents/MacOS/$BINARY_NAME.thin" \
               "$ARCH_APP/$APP_NAME.app/Contents/MacOS/$BINARY_NAME"

            # Also thin mcp-server-macos-use if present
            MCP_BIN="$ARCH_APP/$APP_NAME.app/Contents/MacOS/mcp-server-macos-use"
            if [ -f "$MCP_BIN" ] && lipo -info "$MCP_BIN" 2>/dev/null | grep -q "Architectures"; then
              lipo "$MCP_BIN" -thin "$ARCH" -output "$MCP_BIN.thin" 2>/dev/null && \
                mv "$MCP_BIN.thin" "$MCP_BIN" || true
            fi

            # Also thin whatsapp-mcp if present
            WHATSAPP_BIN="$ARCH_APP/$APP_NAME.app/Contents/MacOS/whatsapp-mcp"
            if [ -f "$WHATSAPP_BIN" ] && lipo -info "$WHATSAPP_BIN" 2>/dev/null | grep -q "Architectures"; then
              lipo "$WHATSAPP_BIN" -thin "$ARCH" -output "$WHATSAPP_BIN.thin" 2>/dev/null && \
                mv "$WHATSAPP_BIN.thin" "$WHATSAPP_BIN" || true
            fi

            # Also thin ffmpeg if present
            FFMPEG_BIN="$ARCH_APP/$APP_NAME.app/Contents/Resources/Fazm_Fazm.bundle/ffmpeg"
            if [ -f "$FFMPEG_BIN" ] && lipo -info "$FFMPEG_BIN" 2>/dev/null | grep -q "Architectures"; then
              lipo "$FFMPEG_BIN" -thin "$ARCH" -output "$FFMPEG_BIN.thin" 2>/dev/null && \
                mv "$FFMPEG_BIN.thin" "$FFMPEG_BIN" || true
            fi

            # Also thin cloudflared if present
            CLOUDFLARED_BIN="$ARCH_APP/$APP_NAME.app/Contents/Resources/Fazm_Fazm.bundle/cloudflared"
            if [ -f "$CLOUDFLARED_BIN" ] && lipo -info "$CLOUDFLARED_BIN" 2>/dev/null | grep -q "Architectures"; then
              lipo "$CLOUDFLARED_BIN" -thin "$ARCH" -output "$CLOUDFLARED_BIN.thin" 2>/dev/null && \
                mv "$CLOUDFLARED_BIN.thin" "$CLOUDFLARED_BIN" || true
            fi

            # Also thin node if present
            NODE_BIN="$ARCH_APP/$APP_NAME.app/Contents/Resources/Fazm_Fazm.bundle/node"
            if [ -f "$NODE_BIN" ] && lipo -info "$NODE_BIN" 2>/dev/null | grep -q "Architectures"; then
              lipo "$NODE_BIN" -thin "$ARCH" -output "$NODE_BIN.thin" 2>/dev/null && \
                mv "$NODE_BIN.thin" "$NODE_BIN" || true
            fi

            # Create ZIP
            ditto -c -k --keepParent "$ARCH_APP/$APP_NAME.app" "$BUILD_DIR/Fazm-$ARCH.zip"
            echo "Created $BUILD_DIR/Fazm-$ARCH.zip ($(du -h "$BUILD_DIR/Fazm-$ARCH.zip" | cut -f1))"
            rm -rf "$ARCH_APP"
          done

          echo "ARCH_ARM64_ZIP=$BUILD_DIR/Fazm-arm64.zip" >> $CM_ENV
          echo "ARCH_X86_64_ZIP=$BUILD_DIR/Fazm-x86_64.zip" >> $CM_ENV

      - name: Sign app
        script: |
          xattr -cr "$APP_BUNDLE"

          # Use 16K page hashes for code signing — required by macOS 26 (Tahoe)
          # for arm64 binaries. Xcode 16.x defaults to 4K pages which causes
          # KERN_CODESIGN_ERROR crashes on macOS 26.
          CS_PAGESIZE="--pagesize 16384"

          # Sign ffmpeg binary
          FFMPEG_BUNDLE_PATH="$APP_BUNDLE/Contents/Resources/Fazm_Fazm.bundle/ffmpeg"
          if [ -f "$FFMPEG_BUNDLE_PATH" ]; then
            codesign --force --options runtime --timestamp $CS_PAGESIZE \
              --sign "$SIGN_IDENTITY" \
              "$FFMPEG_BUNDLE_PATH"
          fi

          # Sign cloudflared binary
          CLOUDFLARED_BUNDLE_PATH="$APP_BUNDLE/Contents/Resources/Fazm_Fazm.bundle/cloudflared"
          if [ -f "$CLOUDFLARED_BUNDLE_PATH" ]; then
            codesign --force --options runtime --timestamp $CS_PAGESIZE \
              --sign "$SIGN_IDENTITY" \
              "$CLOUDFLARED_BUNDLE_PATH"
          fi

          # Sign node with JIT entitlements
          NODE_BUNDLE_PATH="$APP_BUNDLE/Contents/Resources/Fazm_Fazm.bundle/node"
          if [ -f "$NODE_BUNDLE_PATH" ]; then
            codesign --force --options runtime --timestamp $CS_PAGESIZE \
              --sign "$SIGN_IDENTITY" \
              --entitlements Desktop/Node.entitlements \
              "$NODE_BUNDLE_PATH"
          fi

          # Sign acp-bridge native binaries
          ACP_BRIDGE_BUNDLE="$APP_BUNDLE/Contents/Resources/acp-bridge"
          if [ -d "$ACP_BRIDGE_BUNDLE/node_modules" ]; then
            rm -rf "$ACP_BRIDGE_BUNDLE/node_modules/@anthropic-ai/claude-code/vendor/claude-code-jetbrains-plugin" \
              2>/dev/null || true

            find "$ACP_BRIDGE_BUNDLE/node_modules" -type f \
              \( -name "*.node" -o -name "*.dylib" -o -name "*.jnilib" -o -name "*.so" -o -name "rg" \) \
              2>/dev/null | while read native_bin; do
              file "$native_bin" 2>/dev/null | grep -q "Mach-O" && \
                codesign --force --options runtime --timestamp $CS_PAGESIZE \
                  --sign "$SIGN_IDENTITY" "$native_bin"
            done

            find "$ACP_BRIDGE_BUNDLE/node_modules" -type f \
              ! -name "*.js"   ! -name "*.json" ! -name "*.ts"   ! -name "*.map" \
              ! -name "*.md"   ! -name "*.txt"  ! -name "*.yml"  ! -name "*.yaml" \
              ! -name "*.css"  ! -name "*.html" ! -name "*.jar"  ! -name "*.d.ts" \
              ! -name "*.node" ! -name "*.dylib" ! -name "*.jnilib" ! -name "*.so" ! -name "rg" \
              2>/dev/null | while read candidate; do
              file "$candidate" 2>/dev/null | grep -q "Mach-O" && \
                codesign --force --options runtime --timestamp $CS_PAGESIZE \
                  --sign "$SIGN_IDENTITY" "$candidate"
            done
          fi

          # Sign mcp-server-macos-use
          MCP_BIN="$APP_BUNDLE/Contents/MacOS/mcp-server-macos-use"
          if [ -f "$MCP_BIN" ]; then
            codesign --force --options runtime --timestamp $CS_PAGESIZE \
              --sign "$SIGN_IDENTITY" "$MCP_BIN"
          fi

          # Sign whatsapp-mcp
          WHATSAPP_BIN="$APP_BUNDLE/Contents/MacOS/whatsapp-mcp"
          if [ -f "$WHATSAPP_BIN" ]; then
            codesign --force --options runtime --timestamp $CS_PAGESIZE \
              --sign "$SIGN_IDENTITY" "$WHATSAPP_BIN"
          fi

          # Sign Google Workspace MCP native binaries (.so/.dylib in venv)
          WORKSPACE_MCP_BUNDLE="$APP_BUNDLE/Contents/Resources/google-workspace-mcp"
          if [ -d "$WORKSPACE_MCP_BUNDLE/.venv" ]; then
            find "$WORKSPACE_MCP_BUNDLE/.venv" -type f \
              \( -name "*.so" -o -name "*.dylib" \) 2>/dev/null | while read native_bin; do
              file "$native_bin" 2>/dev/null | grep -q "Mach-O" && \
                codesign --force --options runtime --timestamp $CS_PAGESIZE \
                  --sign "$SIGN_IDENTITY" "$native_bin"
            done
            # Sign the venv Python binary itself
            if [ -f "$WORKSPACE_MCP_BUNDLE/.venv/bin/python3" ]; then
              REAL_PYTHON=$(readlink -f "$WORKSPACE_MCP_BUNDLE/.venv/bin/python3" 2>/dev/null || echo "$WORKSPACE_MCP_BUNDLE/.venv/bin/python3")
              if file "$REAL_PYTHON" 2>/dev/null | grep -q "Mach-O"; then
                codesign --force --options runtime --timestamp $CS_PAGESIZE \
                  --sign "$SIGN_IDENTITY" "$REAL_PYTHON"
              fi
            fi
          fi


          # Sign Sparkle components — innermost first
          SPARKLE_FW="$APP_BUNDLE/Contents/Frameworks/Sparkle.framework"
          if [ -d "$SPARKLE_FW" ]; then
            # Verify symlinks are intact (ditto should preserve them)
            if [ ! -L "$SPARKLE_FW/Autoupdate" ]; then
              echo "ERROR: Sparkle.framework symlinks are broken — Autoupdate is not a symlink"
              ls -la "$SPARKLE_FW/"
              exit 1
            fi
            # Ensure Autoupdate binary is executable
            chmod +x "$SPARKLE_FW/Versions/B/Autoupdate"
            codesign --force --options runtime --timestamp $CS_PAGESIZE --sign "$SIGN_IDENTITY" \
              "$SPARKLE_FW/Versions/B/XPCServices/Downloader.xpc"
            codesign --force --options runtime --timestamp $CS_PAGESIZE --sign "$SIGN_IDENTITY" \
              "$SPARKLE_FW/Versions/B/XPCServices/Installer.xpc"
            codesign --force --options runtime --timestamp $CS_PAGESIZE --sign "$SIGN_IDENTITY" \
              "$SPARKLE_FW/Versions/B/Autoupdate"
            codesign --force --options runtime --timestamp $CS_PAGESIZE --sign "$SIGN_IDENTITY" \
              "$SPARKLE_FW/Versions/B/Updater.app"
            codesign --force --options runtime --timestamp $CS_PAGESIZE --sign "$SIGN_IDENTITY" \
              "$SPARKLE_FW"
          fi

          # Sign the main app bundle with release entitlements
          codesign --force --options runtime --timestamp $CS_PAGESIZE \
            --sign "$SIGN_IDENTITY" \
            --entitlements Desktop/Fazm-Release.entitlements \
            "$APP_BUNDLE"

          codesign --verify --verbose=2 "$APP_BUNDLE" 2>&1 | head -3
          # Verify 16K page size was applied to the main binary
          PAGE_SIZE=$(codesign -d --verbose=4 --arch arm64 "$APP_BUNDLE/Contents/MacOS/$BINARY_NAME" 2>&1 | grep 'Page size=' | grep -o '[0-9]*$')
          echo "Code signature page size: $PAGE_SIZE"
          if [ "$PAGE_SIZE" != "16384" ]; then
            echo "ERROR: Expected 16K page size but got $PAGE_SIZE — macOS 26 will crash"
            exit 1
          fi
          echo "App signed successfully with 16K page hashes"

      - name: Notarize app
        script: |
          set -e
          TEMP_ZIP="$BUILD_DIR/notarize-temp.zip"
          ditto -c -k --keepParent "$APP_BUNDLE" "$TEMP_ZIP"

          mkdir -p ~/private_keys
          PRIVATE_KEY_PATH=~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
          echo -e "$APP_STORE_CONNECT_PRIVATE_KEY" > "$PRIVATE_KEY_PATH"

          RESULT=$(xcrun notarytool submit "$TEMP_ZIP" \
            --key "$PRIVATE_KEY_PATH" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --wait \
            --output-format json)

          STATUS=$(echo "$RESULT" | python3 -c \
            "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "")
          SUBMISSION_ID=$(echo "$RESULT" | python3 -c \
            "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null || echo "")

          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization failed: $STATUS"
            [ -n "$SUBMISSION_ID" ] && xcrun notarytool log "$SUBMISSION_ID" \
              --key "$PRIVATE_KEY_PATH" \
              --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
              --issuer "$APP_STORE_CONNECT_ISSUER_ID"
            exit 1
          fi
          rm -f "$TEMP_ZIP"
          echo "App notarized"

      - name: Staple app
        script: |
          xcrun stapler staple "$APP_BUNDLE"
          echo "App stapled"

      - name: Upload dSYMs to Sentry
        ignore_failure: true
        script: |
          set -e
          # Install sentry-cli if not available
          if ! command -v sentry-cli &>/dev/null; then
            curl -sL https://sentry.io/get-cli/ | bash
          fi
          # SPM puts dSYMs next to the build artifacts
          DSYM_DIR="Desktop/.build/arm64-apple-macosx/release"
          DSYM_COUNT=$(find "$DSYM_DIR" -name "*.dSYM" -type d 2>/dev/null | wc -l | tr -d ' ')
          if [ "$DSYM_COUNT" -gt 0 ]; then
            sentry-cli --auth-token "$SENTRY_AUTH_TOKEN" \
              upload-dif --org "${SENTRY_ORG}" --project "${SENTRY_PROJECT}" \
              "$DSYM_DIR" \
              --include-sources
            echo "Uploaded $DSYM_COUNT dSYM(s) to Sentry"
          else
            echo "WARNING: No dSYMs found in $DSYM_DIR"
          fi

      - name: Create DMG installer
        script: |
          set -e
          # Skip DMG for staging builds — staging users auto-update via Sparkle ZIP
          if [ "$IS_STAGING" = "true" ]; then
            echo "Skipping DMG creation for staging build"
            echo "DMG_PATH=" >> $CM_ENV
            exit 0
          fi
          # Stage app + DMG assets (background image, pre-built .DS_Store)
          STAGING_DIR="/tmp/fazm-dmg-staging-$$"
          mkdir -p "$STAGING_DIR"
          ditto "$APP_BUNDLE" "$STAGING_DIR/$APP_NAME.app"
          xcrun stapler validate "$STAGING_DIR/$APP_NAME.app" 2>/dev/null || \
            xcrun stapler staple "$STAGING_DIR/$APP_NAME.app"
          ln -s /Applications "$STAGING_DIR/Applications"

          # Add background image and pre-built .DS_Store for Finder layout
          # (create-dmg's AppleScript doesn't work on headless CI)
          if [ -f "dmg-assets/background.png" ]; then
            mkdir -p "$STAGING_DIR/.background"
            cp dmg-assets/background.png "$STAGING_DIR/.background/background.png"
          fi
          if [ -f "dmg-assets/DS_Store" ]; then
            cp dmg-assets/DS_Store "$STAGING_DIR/.DS_Store"
          fi

          # Set volume icon
          ICNS="$STAGING_DIR/$APP_NAME.app/Contents/Resources/FazmIcon.icns"
          if [ -f "$ICNS" ]; then
            cp "$ICNS" "$STAGING_DIR/.VolumeIcon.icns"
            SetFile -c icnC "$STAGING_DIR/.VolumeIcon.icns" 2>/dev/null || true
          fi

          # Create DMG with hdiutil
          rm -f "$DMG_PATH"
          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$STAGING_DIR" \
            -ov -format UDZO \
            -imagekey zlib-level=9 \
            "$DMG_PATH"

          rm -rf "$STAGING_DIR"
          echo "DMG created at $DMG_PATH"

      - name: Sign, notarize, and staple DMG
        script: |
          set -e
          # Skip for staging — no DMG was created
          if [ "$IS_STAGING" = "true" ]; then
            echo "Skipping DMG notarization for staging build"
            exit 0
          fi
          codesign --force --sign "$SIGN_IDENTITY" "$DMG_PATH"

          mkdir -p ~/private_keys
          PRIVATE_KEY_PATH=~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
          echo -e "$APP_STORE_CONNECT_PRIVATE_KEY" > "$PRIVATE_KEY_PATH"

          RESULT=$(xcrun notarytool submit "$DMG_PATH" \
            --key "$PRIVATE_KEY_PATH" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --wait \
            --output-format json)

          STATUS=$(echo "$RESULT" | python3 -c \
            "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "")
          SUBMISSION_ID=$(echo "$RESULT" | python3 -c \
            "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null || echo "")

          if [ "$STATUS" != "Accepted" ]; then
            echo "DMG notarization failed: $STATUS"
            [ -n "$SUBMISSION_ID" ] && xcrun notarytool log "$SUBMISSION_ID" \
              --key "$PRIVATE_KEY_PATH" \
              --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
              --issuer "$APP_STORE_CONNECT_ISSUER_ID"
            exit 1
          fi

          xcrun stapler staple "$DMG_PATH"
          echo "DMG signed, notarized, and stapled"

      - name: Create Sparkle ZIP and sign
        script: |
          ditto -c -k --keepParent "$APP_BUNDLE" "$SPARKLE_ZIP_PATH"

          SPARKLE_BIN="Desktop/.build/artifacts/sparkle/Sparkle/bin"
          ED_SIGNATURE=""
          if [ -d "$SPARKLE_BIN" ] && [ -f "$SPARKLE_BIN/sign_update" ]; then
            if [ -n "$SPARKLE_PRIVATE_KEY" ]; then
              ED_SIGNATURE=$(echo "$SPARKLE_PRIVATE_KEY" | \
                "$SPARKLE_BIN/sign_update" "$SPARKLE_ZIP_PATH" --ed-key-file - 2>/dev/null | \
                grep "sparkle:edSignature" | \
                sed 's/.*edSignature="\([^"]*\)".*/\1/')
            fi
          fi

          if [ -n "$ED_SIGNATURE" ]; then
            echo "EdDSA signature: $ED_SIGNATURE"
          else
            echo "WARNING: Could not generate EdDSA signature — Sparkle auto-update will not work"
          fi
          echo "ED_SIGNATURE=$ED_SIGNATURE" >> $CM_ENV

      - name: Create GitHub release
        script: |
          DOWNLOAD_URL="https://github.com/$GITHUB_REPO/releases/download/$CM_TAG/Fazm.zip"

          CHANGELOG_MD=$(python3 -c "
          import json
          try:
            with open('CHANGELOG.json') as f:
              data = json.load(f)
            changes = data.get('releases', [{}])[0].get('changes', [])
            print('\n'.join('- ' + c for c in changes))
          except:
            print('- Bug fixes and improvements')
          ")

          CHANGELOG_JSON=$(python3 -c "
          import json
          try:
            with open('CHANGELOG.json') as f:
              data = json.load(f)
            print(json.dumps(data.get('releases', [{}])[0].get('changes', [])))
          except:
            print('[]')
          ")

          CHANGELOG_JSON_B64=$(echo "$CHANGELOG_JSON" | base64)
          echo "CHANGELOG_JSON_B64=$CHANGELOG_JSON_B64" >> $CM_ENV
          echo "DOWNLOAD_URL=$DOWNLOAD_URL" >> $CM_ENV

          # Build release notes — include EdDSA signature so appcast generator can extract it
          SIG_SECTION=""
          if [ -n "$ED_SIGNATURE" ]; then
            SIG_SECTION="
          <!-- edSignature=\"${ED_SIGNATURE}\" -->"
          fi

          RELEASE_NOTES="## Fazm Desktop v${VERSION}

          ### What's New
          ${CHANGELOG_MD}

          ### Downloads
          - **DMG Installer**: For fresh installs, download the DMG below
          - **Auto-Update**: Existing users will receive this update automatically via Sparkle${SIG_SECTION}"

          gh release view "$CM_TAG" --repo "$GITHUB_REPO" &>/dev/null && \
            gh release delete "$CM_TAG" --repo "$GITHUB_REPO" --yes 2>/dev/null || true

          PRERELEASE_FLAG=""
          if [ "$IS_STAGING" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          # Build asset list — DMG is skipped for staging builds
          ASSETS="$SPARKLE_ZIP_PATH"
          if [ "$IS_STAGING" != "true" ] && [ -n "$DMG_PATH" ] && [ -f "$DMG_PATH" ]; then
            ASSETS="$ASSETS $DMG_PATH"
          fi

          # Create release and upload assets with retry.
          # Use perl alarm for a cross-platform 1800s timeout (works on macOS + Linux).
          RELEASE_CREATED=false
          for attempt in 1 2 3; do
            if perl -e 'alarm 1800; exec @ARGV' -- \
              gh release create "$CM_TAG" \
              --repo "$GITHUB_REPO" \
              --title "Fazm Desktop v${VERSION}" \
              --notes "$RELEASE_NOTES" \
              $PRERELEASE_FLAG \
              $ASSETS; then
              RELEASE_CREATED=true
              break
            fi
            echo "Attempt $attempt failed, retrying..."
            gh release delete "$CM_TAG" --repo "$GITHUB_REPO" --yes 2>/dev/null || true
            sleep 10
          done

          if [ "$RELEASE_CREATED" != "true" ]; then
            echo "ERROR: Failed to create GitHub release after 3 attempts"
            exit 1
          fi

          echo "GitHub release created: $CM_TAG (staging=$IS_STAGING)"

      - name: Register release in Firestore
        script: |
          # Source the decoded .env.app so FAZM_BACKEND_URL is available in this step
          ENV_FILE="$CM_BUILD_DIR/build/$APP_NAME.app/Contents/Resources/.env"
          if [ -f "$ENV_FILE" ]; then
            set -a
            source "$ENV_FILE"
            set +a
          fi

          # Register this release in Firestore as "staging" channel so the appcast
          # picks it up. The RELEASE_SECRET authenticates to the Fazm backend.
          if [ -z "$RELEASE_SECRET" ]; then
            echo "Warning: RELEASE_SECRET not set, skipping Firestore registration"
          else
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $RELEASE_SECRET" \
              -d "{\"tag\": \"$CM_TAG\", \"version\": \"$VERSION\", \"build\": \"$BUILD_NUMBER\"}" \
              "${FAZM_BACKEND_URL}/api/releases/register")
            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | sed '$d')
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✓ Release registered: $CM_TAG (channel=staging)"
            else
              echo "ERROR: Release registration returned HTTP $HTTP_CODE: $BODY"
              exit 1
            fi
          fi

      - name: Deploy appcast.xml
        script: |
          ./scripts/deploy-appcast.sh
          echo "Appcast deployed to GitHub release"

      - name: Upload arch-specific ZIPs to GCS
        script: |
          set -e
          # Decode GCP service account key
          echo "$GCP_SERVICE_ACCOUNT_KEY" | base64 --decode > /tmp/gcp-sa-key.json
          gcloud auth activate-service-account --key-file=/tmp/gcp-sa-key.json
          rm /tmp/gcp-sa-key.json

          BUCKET="fazm-prod-releases"
          PREFIX="desktop/$VERSION"
          BASE_URL="https://storage.googleapis.com/$BUCKET"

          # Upload arch-specific ZIPs
          gcloud storage cp "$ARCH_ARM64_ZIP"  "gs://$BUCKET/$PREFIX/Fazm-arm64.zip"
          gcloud storage cp "$ARCH_X86_64_ZIP" "gs://$BUCKET/$PREFIX/Fazm-x86_64.zip"

          # Compute SHA256 and sizes
          ARM64_SHA256=$(shasum -a 256 "$ARCH_ARM64_ZIP" | awk '{print $1}')
          X86_64_SHA256=$(shasum -a 256 "$ARCH_X86_64_ZIP" | awk '{print $1}')
          ARM64_SIZE=$(stat -f%z "$ARCH_ARM64_ZIP" 2>/dev/null || stat -c%s "$ARCH_ARM64_ZIP")
          X86_64_SIZE=$(stat -f%z "$ARCH_X86_64_ZIP" 2>/dev/null || stat -c%s "$ARCH_X86_64_ZIP")

          # Generate and upload latest.json manifest
          python3 -c "
          import json
          manifest = {
              'version': '$VERSION',
              'arm64': {
                  'url': '$BASE_URL/$PREFIX/Fazm-arm64.zip',
                  'size': int('$ARM64_SIZE'),
                  'sha256': '$ARM64_SHA256'
              },
              'x86_64': {
                  'url': '$BASE_URL/$PREFIX/Fazm-x86_64.zip',
                  'size': int('$X86_64_SIZE'),
                  'sha256': '$X86_64_SHA256'
              }
          }
          with open('/tmp/fazm-latest.json', 'w') as f:
              json.dump(manifest, f, indent=2)
          "

          gcloud storage cp /tmp/fazm-latest.json "gs://$BUCKET/$PREFIX/latest.json"

          # For non-staging (production) builds, also update the global desktop/latest.json
          # so the stub installer serves the new version to fresh installs.
          if [ "$IS_STAGING" != "true" ]; then
            echo "Updating global desktop/latest.json for stub installer..."
            gcloud storage cp /tmp/fazm-latest.json "gs://$BUCKET/desktop/latest.json" \
              --cache-control="no-cache, max-age=0"
            echo "✓ desktop/latest.json updated — new installs will get v$VERSION"
          fi

          echo "Uploaded arch-specific ZIPs and manifest to GCS"
          echo "  arm64:  $BASE_URL/$PREFIX/Fazm-arm64.zip ($ARM64_SIZE bytes)"
          echo "  x86_64: $BASE_URL/$PREFIX/Fazm-x86_64.zip ($X86_64_SIZE bytes)"
          echo "  version manifest: $BASE_URL/$PREFIX/latest.json"

      - name: Build stub installer and create DMG
        script: |
          set -e
          unset TOOLCHAINS

          # Build universal stub installer
          echo "Building stub installer (arm64)..."
          xcrun swift build -c release --package-path Installer --triple arm64-apple-macosx
          echo "Building stub installer (x86_64)..."
          xcrun swift build -c release --package-path Installer --triple x86_64-apple-macosx

          # Create universal binary
          INSTALLER_ARM64="Installer/.build/arm64-apple-macosx/release/FazmInstaller"
          INSTALLER_X86="Installer/.build/x86_64-apple-macosx/release/FazmInstaller"
          mkdir -p /tmp/installer-bundle

          lipo -create "$INSTALLER_ARM64" "$INSTALLER_X86" -output /tmp/installer-bundle/FazmInstaller

          # Create installer .app bundle
          INSTALLER_APP="$BUILD_DIR/Install Fazm.app"
          mkdir -p "$INSTALLER_APP/Contents/MacOS"
          mkdir -p "$INSTALLER_APP/Contents/Resources"

          cp /tmp/installer-bundle/FazmInstaller "$INSTALLER_APP/Contents/MacOS/FazmInstaller"
          cp Installer/Info.plist "$INSTALLER_APP/Contents/Info.plist"
          [ -f "fazm_icon.icns" ] && cp fazm_icon.icns "$INSTALLER_APP/Contents/Resources/FazmIcon.icns"

          # Copy SPM resource bundle if it exists
          INSTALLER_BUILD_DIR="Installer/.build/arm64-apple-macosx/release"
          INSTALLER_RESOURCE_BUNDLE="$INSTALLER_BUILD_DIR/FazmInstaller_FazmInstaller.bundle"
          if [ -d "$INSTALLER_RESOURCE_BUNDLE" ]; then
            cp -R "$INSTALLER_RESOURCE_BUNDLE" "$INSTALLER_APP/Contents/Resources/"
          fi

          printf "APPL????" > "$INSTALLER_APP/Contents/PkgInfo"

          # Update version in Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" \
            "$INSTALLER_APP/Contents/Info.plist" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string $VERSION" \
            "$INSTALLER_APP/Contents/Info.plist"

          # Sign installer
          codesign --force --options runtime --timestamp \
            --sign "$SIGN_IDENTITY" \
            "$INSTALLER_APP"

          # Create stub installer DMG
          STUB_DMG="$BUILD_DIR/Fazm-Installer.dmg"
          STUB_STAGING="/tmp/fazm-stub-dmg-$$"
          mkdir -p "$STUB_STAGING"
          ditto "$INSTALLER_APP" "$STUB_STAGING/Install Fazm.app"

          # Add volume icon
          ICNS="$STUB_STAGING/Install Fazm.app/Contents/Resources/FazmIcon.icns"
          if [ -f "$ICNS" ]; then
            cp "$ICNS" "$STUB_STAGING/.VolumeIcon.icns"
            SetFile -c icnC "$STUB_STAGING/.VolumeIcon.icns" 2>/dev/null || true
          fi

          hdiutil create \
            -volname "Install Fazm" \
            -srcfolder "$STUB_STAGING" \
            -ov -format UDZO \
            -imagekey zlib-level=9 \
            "$STUB_DMG"

          rm -rf "$STUB_STAGING" /tmp/installer-bundle

          # Sign and notarize stub DMG
          codesign --force --sign "$SIGN_IDENTITY" "$STUB_DMG"

          mkdir -p ~/private_keys
          PRIVATE_KEY_PATH=~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
          echo -e "$APP_STORE_CONNECT_PRIVATE_KEY" > "$PRIVATE_KEY_PATH"

          RESULT=$(xcrun notarytool submit "$STUB_DMG" \
            --key "$PRIVATE_KEY_PATH" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --wait \
            --output-format json)

          STATUS=$(echo "$RESULT" | python3 -c \
            "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "")

          if [ "$STATUS" != "Accepted" ]; then
            echo "WARNING: Stub DMG notarization failed: $STATUS (non-fatal)"
          else
            xcrun stapler staple "$STUB_DMG"
            echo "Stub DMG notarized and stapled"
          fi

          echo "STUB_DMG=$STUB_DMG" >> $CM_ENV
          echo "Stub installer DMG: $(du -h "$STUB_DMG" | cut -f1)"

      - name: Upload stub installer to GitHub release
        script: |
          if [ -f "$STUB_DMG" ]; then
            gh release upload "$CM_TAG" "$STUB_DMG" \
              --repo "$GITHUB_REPO" \
              --clobber
            echo "Stub installer DMG uploaded to GitHub release"
          fi

    artifacts:
      - build/*.app
      - build/*.dmg
      - build/*.zip
      - build/Fazm-arm64.zip
      - build/Fazm-x86_64.zip
      - build/Fazm-Installer.dmg
    publishing:
      email:
        recipients:
          - i@m13v.com
        notify:
          success: true
          failure: true
